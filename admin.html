<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>攝影集 - 後台管理系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 40px 20px;
        }
        .admin-panel {
            max-width: 600px; margin: 0 auto; background: white;
            padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: #2c3e50; }
        .section {
            border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 6px;
        }
        .section h3 { margin-top: 0; font-size: 16px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="file"], select {
            width: 100%; padding: 10px; margin-bottom: 10px;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; background: #2c3e50; color: white;
            border: none; border-radius: 4px; font-size: 16px; cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #1a252f; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>⚙️ 攝影集控制台</h2>

        <div class="section">
            <h3>1. 網站資訊</h3>
            <label for="site-title">主標題：</label>
            <input type="text" id="site-title" placeholder="例如：2025s2" >
        </div>

        <div class="section">
            <h3>2. 新增照片</h3>
            <label for="photo-upload">選擇檔案：</label>
            <input type="file" id="photo-upload" accept="image/*" multiple>
        </div>

        <div class="section">
            <h3>3. 照片分類</h3>
            <label for="photo-category">請選擇這張照片的大類別：</label>
            <select id="photo-category">
                <option value="Life">Life</option>
                <option value="About">About</option>
                <option value="Camping">Camping</option>
            </select>
        </div>

        <button id="save-btn">上傳並儲存</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJ7F4RmMlx7M_TK9h_ivBokM4AkdBoQ6c",
            authDomain: "fir-web-gallery.firebaseapp.com",
            projectId: "fir-web-gallery",
            storageBucket: "fir-web-gallery.firebasestorage.app",
            messagingSenderId: "202553975102",
            appId: "1:202553975102:web:40ca5a8d599292f69d0c6f"
        };

        const IMGBB_API_KEY = "92ad0e7da95a9943165f30ff62f3a557";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('save-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-btn');
            const titleInput = document.getElementById('site-title').value;
            const title = titleInput || "My Photography"; 
            const category = document.getElementById('photo-category').value; 
            const photoInput = document.getElementById('photo-upload');

            btn.disabled = true;
            
            try {
                // 1. 更新標題到 Firebase
                await setDoc(doc(db, "settings", "main"), { title: title });

                if (photoInput.files.length > 0) {
                    const files = photoInput.files;
                    let successCount = 0;

                    // 開始批量上傳雲端
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        
                        btn.innerText = `上傳雲端中 (${i + 1}/${files.length}) : 若檔案較大請耐心等待...`;
                        
                        const cloudFormData = new FormData();
                        cloudFormData.append("image", file);

                        try {
                            // 稍微等待 1.5 秒，避免被 ImgBB 判定為機器人攻擊
                            await new Promise(resolve => setTimeout(resolve, 1500));

                            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                                method: "POST", body: cloudFormData
                            });
                            const data = await response.json();

                            if (data.success) {
                                await addDoc(collection(db, "photos"), {
                                    url: data.data.url,
                                    category: category,
                                    timestamp: Date.now()
                                });
                                console.log(`[檔案 ${i+1}] 雲端上傳成功`);
                                successCount++;
                            } else {
                                console.error(`[檔案 ${i+1}] 雲端圖床錯誤：`, data.error.message);
                            }
                        } catch (cloudError) {
                            console.error(`[檔案 ${i+1}] 網路連線中斷或逾時：`, cloudError);
                        }
                    }

                    alert(`批量處理完成！\n共選取 ${files.length} 張，成功上傳雲端 ${successCount} 張。\n(若有缺漏，請留意是否單張檔案過大超過 ImgBB 限制)`);
                } else {
                    alert("標題設定已更新！（未選擇新照片）");
                }
            } catch (error) {
                console.error("發生嚴重錯誤:", error);
                alert("儲存失敗，請檢查網路。");
            } finally {
                photoInput.value = ""; 
                btn.disabled = false;
                btn.innerText = "上傳並儲存";
            }
        });
    </script>
</body>
</html>
